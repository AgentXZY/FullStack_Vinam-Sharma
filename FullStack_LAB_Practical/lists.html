<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Centered Dynamic List</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #f9f9f9;
    }
    h2 {
      margin-bottom: 15px;
    }
    input, button {
      padding: 8px;
      margin: 5px;
    }
    ul {
      margin-top: 20px;
      padding-left: 20px;
      background: #fff;
      border: 1px solid #ccc;
      border-radius: 4px;
      width: 250px;
    }
    li {
      margin: 6px 0;
    }
  </style>
</head>
<body>
  <h2>Dynamic List(Q3)</h2>
  <input id="itemInput" placeholder="Enter item">
  <button onclick="addItem()">Add</button>
  <button onclick="removeItem()">Remove Last</button>

  <ul id="itemList"></ul>

  <script>
    function addItem() {
      let val = document.getElementById('itemInput').value.trim();
      if (val) {
        let li = document.createElement('li');
        li.textContent = val;
        document.getElementById('itemList').appendChild(li);
        document.getElementById('itemInput').value = '';
      }
    }
    function removeItem() {
      let list = document.getElementById('itemList');
      if (list.lastChild) list.removeChild(list.lastChild);
    }
  </script>
</body>
</html>
